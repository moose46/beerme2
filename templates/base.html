<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beer Me Greg</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--    <link href="{{ url_for('static', filename='bootstrap.min.css') }}" rel="stylesheet">-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-b5kHyXgcpbZJO/tY9Ul7kGkf1S0CWuKcCD38l8YkeH8z8QjE0GmW1gYU5S9FOnJ0"
            crossorigin="anonymous"></script>
</head>
<style>
    .row {
    {#display: flex;#}{#flex-wrap: wrap;#} margin: 0;
    }

    .cooler {
        column-width: 150px;
    {#column-wrap: nowrap;#} text-align: center;
        margin: 0;
    {#flex: 1;#} flex: 1;
        padding: 5px;
        font-size: 16px;
        color: #FFB500;
    }

    .column {
        flex: 1;
        padding: 5px;
        margin: 0;
        text-align: center;
        font-size: 14px;
        color: #FFB500;
    {#border: .5px solid #d5dd15;#}{#border-bottom: #FFB500;#} box-sizing: border-box;
    }

    .column-right {
        flex: 1;
        padding: 10px;
        margin: 0;
        text-align: right;
        font-size: 10px;
        color: #FFB500;
    }

    /* Responsive: stack columns on small screens */
    @media (max-width: 600px) {
        .col-50, .col-33, .column {
            flex: 0 0 100%;
        }
    }

    .col-50 {
        flex: 0 0 20%;
    }

    .beer-column {
        flex: 0 0 30%;
    }

    container {
        display: flex;
        justify-content: center; /* Centers horizontally */
        align-items: center; /* Centers vertically */
        height: 100vh; /* Full viewport height */
        width: 90vh;
    }

    table {
        text-align: center;
        width: -webkit-fill-available;
    }

    th {
        text-align: center;
        color: aliceblue;
    }

    tr {
    {#text-align: center;#}
    }

    td {
    {#text-align: center;#}{#width: 200px;#}
    }

    .summary {
        text-align: left;
        color: white;
        padding: 10px;
    }

    .title {
        color: white;
    }

    .race {
    {#border: 1px solid #0e61dd;#} font-weight: bold;
        color: ivory;
        font-style: italic;
    {#font-family: "Segoe UI", system-ui, sans-serif;#}
    }

    .player {
        text-align: right;
    {#border: 1px solid #0e61dd;#} color: #FFB500;
    }

    .beer {
        text-align: center;
        color: #FFB500;
    }

    .center {
        margin-left: auto;
        margin-right: auto;
    }

    .driver_name {
    {#border: 1px solid #0e61dd;#}{#text-align: center;#}{#font-weight: bold;#}{#width: 100px;#}{#height: 20px;#} color: #FFB500;
        text-align: right;
        padding-right: 5px;
    }

    h1 {
        text-align: center;
        font-family: 'Consolas', 'Deja Vu Sans Mono', 'Bitstream Vera Sans Mono', monospace;
        font-weight: bolder;
    }

    #div2 {
        border-radius: 5px;
        border: 2px solid #303337;
        padding: 5px;
        width: 50px;
        height: 25px;
    }

    .results {
        border-radius: 5px;
        border: 2px solid #303337;
        padding: 5px;
        width: 50px;
        height: 25px;
    }

    .myHr {
        color: black;
    }

    .left-th {
        text-align: right;
        padding-right: 10px;
    }

    .left-td {
        text-align: right;
        padding-right: 10px;
        font-weight: bold;
    }

    .myDiv {
        /*border: 2px outset red;*/
        /*background-color: lightgoldenrodyellow;*/
        /*text-align: center;*/
        /*font-size: larger;*/
        font-style: italic;
        margin: 3px;
        padding: 3px;
        font-size: small;
        text-align: center;

    }

    .a-tag {
        color: azure;
    }

    li {
        font-min-size: small;
        font-size: small;
    }

    .leftDiv {
        /*position: fixed;*/
        width: 25%;
        padding: 10px;
    }

    sup {
        font-size: xx-small;
    }
</style>
<link rel="icon"
      type="image/png"
      href="../static/favicon.ico">

<body style="background: #0042E8">
<div class="container">

    <!-- child template -->
    {% block content %}{% endblock %}

    <!-- errors -->
    {% if error %}
        <p class="error"><strong>Error:</strong> {{ error }}</p>
    {% endif %}

    <!-- messages -->
    {% for message in get_flashed_messages() %}
        {{ message }}
    {% endfor %}
</div>

</body>
</html>
