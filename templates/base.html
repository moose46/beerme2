<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Beer Me Greg</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--    <link href="{{ url_for('static', filename='bootstrap.min.css') }}" rel="stylesheet">-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-b5kHyXgcpbZJO/tY9Ul7kGkf1S0CWuKcCD38l8YkeH8z8QjE0GmW1gYU5S9FOnJ0"
      crossorigin="anonymous"
    ></script>
    <style>
      .cooler {
        column-width: 150px;
        text-align: center;
        margin: 0;
        flex: 1;
        padding: 5px;
        font-size: 16px;
        color: #ffb500;
      }

      .column {
        flex: 1;
        padding: 5px;
        margin: 0;
        text-align: left;
        font-size: 14px;
        color: #ffb500;
        box-sizing: border-box;
      }

      .column-right {
        flex: 1;
        padding: 10px;
        margin: 0;
        text-align: right;
        font-size: 10px;
        color: #ffb500;
      }

      /* Responsive: stack columns on small screens */
      @media (max-width: 600px) {
        .col-50,
        .col-33,
        .column {
          flex: 0 0 100%;
        }
      }

      .col-50 {
        flex: 0 0 20%;
      }

      .beer-column {
        flex: 0 0 30%;
      }

      .summary {
        text-align: left;
        color: white;
        padding: 10px;
      }

      .title {
        color: white;
      }

      .race {
        font-weight: bold;
        color: #ffb500;
      }

      .player {
        text-align: right;
        color: #ffb500;
      }

      .beer {
        text-align: center;
        color: #ffb500;
      }

      #div2 {
        border-radius: 5px;
        border: 2px solid #303337;
        padding: 5px;
        width: 50px;
        height: 25px;
      }

      .results {
        border-radius: 5px;
        border: 2px solid #303337;
        padding: 5px;
        width: 50px;
        height: 25px;
      }

      .left-th {
        text-align: right;
        padding-right: 10px;
      }

      .left-td {
        text-align: right;
        padding-right: 10px;
        font-weight: bold;
      }
      body {
        background-color: #303337;
      }
      .myDiv {
        font-style: italic;
        margin: 3px;
        padding: 3px;
        font-size: small;
        text-align: center;
      }
    </style>
    <link rel="icon" type="image/png" href="../static/favicon.ico" />
  </head>

  <body>
    <div class="container">
      <!-- child template -->
      {% block content %}{% endblock %}

      <!-- errors -->
      {% if error %}
      <p class="error"><strong>Error:</strong> {{ error }}</p>
      {% endif %}

      <!-- messages -->
      {% for message in get_flashed_messages() %} {{ message }} {% endfor %}
      <div class="container">
        <table>
          <tr>
            <td>
              <h6 class="text-light center">Created by a Python: ~~~~~~~``</h6>
            </td>
          </tr>
        </table>
      </div>
    </div>
  </body>
</html>
